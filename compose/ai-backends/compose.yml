  #     WEB_CONSOLE_PASSWORD: ${CLAUDE_ADMIN_PASS}
  #     HTTP_PROXY: ${HTTP_PROXY}

  cli-proxy-api:
    image: eceasy/cli-proxy-api:latest
    container_name: cli-proxy-api
    networks:
      - lan
    ports:
      - "8317:8317"
      # - "8085:8085"
      # - "1455:1455"
      # - "54545:54545"
      # - "11451:11451"
      # - "51121:51121"
    volumes:
      - ${DATA}/CLIProxyAPI/config.yaml:/CLIProxyAPI/config.yaml
      - ${DATA}/CLIProxyAPI/auths:/root/.cli-proxy-api
      - ${DATA}/CLIProxyAPI/logs:/CLIProxyAPI/logs
    restart: unless-stopped

  grok2api:
    # image: 'mypr/grok2api:latest'
    # build:
    #   context: https://github.com/cloudriver8/grok2api.git#feat/console-x-ai-routing
    image: ghcr.io/jiujiu532/grok2api:latest
    container_name: grok2api
    # ports:
    #   - "18000:8000"
    volumes:
      - ${DATA}/grok2api:/app/data
      - ${DATA}/grok2api/logs:/app/logs
    environment:
      # - STORAGE_MODE=file
      TZ: Asia/Shanghai
      LOG_LEVEL: INFO
      SERVER_PORT: 8000
      SERVER_WORKERS: 1
      ACCOUNT_STORAGE: local
    networks:
      - lan
    restart: always

  claude2api:
    image: pushzx/claude2api:latest-arm64
    container_name: claude2api
    restart: unless-stopped
    networks:
      - lan
    # ports:
    #   - "${PORT:-8080}:8080"
    environment:
      - LISTEN_ADDR=:8080
      - CLAUDE_SESSION_KEYS=${CLAUDE_SESSION_KEYS}
      - ADMIN_USER=${CLAUDE_ADMIN_USER}
      - ADMIN_PASS=${CLAUDE_ADMIN_PASS}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - PROXY_HOST=http://gluetun
      - PROXY_PORT=8888

  freebuff2api:
    image: ghcr.io/denniszlei/freebuff2api:latest
    container_name: freebuff2api
    restart: unless-stopped
    networks:
      - lan
    # ports:
    #   - "8000:8000"
    environment:
      - FREEBUFF_TOKEN=${FREEBUFF_AUTH_TOKENS}
      - FREEBUFF_API_KEY=${CLAUDE_API_KEY}
      - FREEBUFF_AD_PROVIDERS=gravity,zeroclick
      - FREEBUFF_PROXY_ENABLED=true
      - FREEBUFF_PROXY_URL=${WS_RES_PROXY}
      - FREEBUFF_DEBUG=true
      - FREEBUFF_LOG_COLOR=true
      - FREEBUFF_TIMEZONE=America/Los_Angeles
      - FREEBUFF_LOCALE=en-US
      - FREEBUFF_OS=windows
      - FREEBUFF_BROWSER_UA=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/140.0.0.0 Safari/537.36


  ds2api:
    build: https://github.com/XxxXTeam/ds2api.git
    image: ds2api-xteam:latest
    container_name: ds2api
    pull_policy: never
    restart: always
    networks:
      - lan
    # ports:
    #   - "5001:5001"
    volumes:
      - ${DATA}/ds2api/config.json:/app/config.json    # 配置文件
      # - ./.env:/app/.env                  # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
      - DS2API_CONFIG_PATH=/app/config.json
      - DS2API_ADMIN_KEY=${CLAUDE_ADMIN_PASS}

  qwen2api:
    container_name: qwen2api
    image: rfym21/qwen2api:latest
    restart: always
    ports:
      - "3000:3000"
    networks:
      - lan
    volumes:
      - ${DATA}/qwen2api/:/app/data
      - ${DATA}/qwen2api/logs:/app/logs
    environment:
      - SERVICE_PORT=3000
      - API_KEY=${CLAUDE_API_KEY}
      # - PROXY_URL=${HTTP_PROXY}
      - PM2_INSTANCES=1
      - PM2_MAX_MEMORY=1G
      # Search info display mode (table: collapsible tables / text: plain text)
      - SEARCH_INFO_MODE=table
      - OUTPUT_THINK=true
      - SIMPLE_MODEL_MAP=true
      # 数据保存模式
      # Data save mode (none / file / redis)
      - DATA_SAVE_MODE=none
      # 账号(如果使用redis和file模式，则不需要填写)
      # Accounts (not needed for redis/file mode)
      - ACCOUNTS=${QW_ACCOUNTS}
      # 图片缓存
      # Image cache mode (default: memory / file: disk)
      - CACHE_MODE=default
      # - LOG_LEVEL=debug



