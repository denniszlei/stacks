networks:
  lan:
      external: true

services:

  aistudio2api:
    # image: hkfires/aistudiobuildws:latest
    build: https://github.com/hkfires/AIStudioBuildWS.git
    container_name: aistudio2api
    environment:
      - CAMOUFOX_INSTANCE_URL=${AIBUILD_URL}
      - CAMOUFOX_PROXY=${AIBUILD_PROXY}
    volumes:
      - ${DATA}/buildws/cookies:/app/cookies:rw
      - ${DATA}/buildws/logs:/app/logs:rw
    restart: always
    networks:
      - lan
    deploy:
      resources:
        limits:
          cpus: '2'       # 限制最多使用 2 个 CPU 核心
          memory: 4G        # 限制内存最大为 2GB
        reservations:
          memory: 2G      # 保证至少分配 512M 内存

  cli-proxy-api:
    image: eceasy/cli-proxy-api:latest
    container_name: cli-proxy-api
    networks:
      - lan
    ports:
      - "8317:8317"
      # - "8085:8085"
      # - "1455:1455"
      # - "54545:54545"
      # - "11451:11451"
      # - "51121:51121"
    volumes:
      - ${DATA}/CLIProxyAPI/config.yaml:/CLIProxyAPI/config.yaml
      - ${DATA}/CLIProxyAPI/auths:/root/.cli-proxy-api
      - ${DATA}/CLIProxyAPI/logs:/CLIProxyAPI/logs
    restart: unless-stopped

  grok2api:
    # image: 'tomiya233/grok2api:latest'
    # build: https://github.com/Tomiya233/grok2api.git
    image: ghcr.io/chenyme/grok2api:latest
    container_name: grok2api
    # ports:
    #   - "18000:8000"
    volumes:
      - ${DATA}/grok2api:/app/data
      - ${DATA}/grok2api/logs:/app/logs
    environment:
      # - STORAGE_MODE=file
      TZ: Asia/Shanghai
      LOG_LEVEL: INFO
      SERVER_PORT: 8000
      SERVER_WORKERS: 1
      ACCOUNT_STORAGE: local
    networks:
      - lan
    restart: always

  claude2api:
    image: pushzx/claude2api:latest-arm64
    container_name: claude2api
    restart: unless-stopped
    networks:
      - lan
    # ports:
    #   - "${PORT:-8080}:8080"
    environment:
      - LISTEN_ADDR=:8080
      - CLAUDE_SESSION_KEYS=${CLAUDE_SESSION_KEYS}
      - ADMIN_USER=${CLAUDE_ADMIN_USER}
      - ADMIN_PASS=${CLAUDE_ADMIN_PASS}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - PROXY_HOST=http://gluetun
      - PROXY_PORT=8888

  ds2api:
    image: ghcr.io/cjackhwang/ds2api:latest
    container_name: ds2api
    restart: always
    networks:
      - lan
    ports:
      - "5001:5001"
    volumes:
      - ${DATA}/ds2api/config.json:/app/config.json    # 配置文件
      # - ./.env:/app/.env                  # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
      - DS2API_ADMIN_KEY=${DS2API_ADMIN_KEY:-ds2api}

  qwen2api:
    container_name: qwen2api
    image: rfym21/qwen2api:latest
    restart: always
    ports:
      - "3000:3000"
    networks:
      - lan
    volumes:
      - ${DATA}/qwen2api/:/app/data
      - ${DATA}/qwen2api/logs:/app/logs
    environment:
      - SERVICE_PORT=3000
      - API_KEY=${CLAUDE_API_KEY}
      - PROXY_URL=http://gluetun:8888
      - PM2_INSTANCES=1
      - PM2_MAX_MEMORY=1G
      # Search info display mode (table: collapsible tables / text: plain text)
      - SEARCH_INFO_MODE=table
      - OUTPUT_THINK=true
      - SIMPLE_MODEL_MAP=true
      # 数据保存模式
      # Data save mode (none / file / redis)
      - DATA_SAVE_MODE=file
      # 账号(如果使用redis和file模式，则不需要填写)
      # Accounts (not needed for redis/file mode)
      # - ACCOUNTS=
      # 图片缓存
      # Image cache mode (default: memory / file: disk)
      - CACHE_MODE=default

  zai2api-pg:
    image: postgres:16-alpine
    container_name: zai2api-pg
    networks:
      - lan
    environment:
      POSTGRES_DB: ${DB_NAME:-zai2api}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      TZ: ${DB_TIMEZONE:-Asia/Shanghai}
    volumes:
      - ${DATA}/zai2api/db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  zai2api-go:
    image: zai2api-go:latest
    container_name: zai2api-go
    pull_policy: never
    networks:
      - lan
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      PORT: 8080
      # Production mode will reject weak defaults unless ALLOW_INSECURE_DEFAULTS=true
      GIN_MODE: ${GIN_MODE:-release}
      APP_ENV: ${APP_ENV:-production}

      # Required (put them in .env)
      ADMIN_USERNAME: ${CLAUDE_ADMIN_USER}
      ADMIN_PASSWORD: ${CLAUDE_ADMIN_PASS}
      JWT_SECRET: ${JWT_SECRET}

      # Database (defaults are fine for local use; change in production)
      DB_HOST: zai2api-pg
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-zai2api}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Shanghai}

      # Optional deployment-specific knobs
      # CORS_ALLOW_ORIGINS: "https://admin.example.com"
      # TRUSTED_PROXIES: "127.0.0.1,10.0.0.0/8"
      # ALLOW_INSECURE_DEFAULTS: "false"

      # Runtime limits now live in the admin settings page and are persisted in Postgres.

    depends_on:
      zai2api-pg:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


